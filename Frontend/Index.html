<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartClearance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />
    <link rel="stylesheet" href="./Styles/Main.css">
</head>
<body>
    <div id="LoaderWrapper" class="LoaderWrapper">
        <div class="GoogleSpinner">
            <svg viewBox="0 0 50 50">
                <circle class="Path" cx="25" cy="25" r="20" fill="none" stroke-width="4"></circle>
            </svg>
        </div>
    </div>

    <main id="MainContent" class="MainContent Hidden">
        <nav class="TopNav">
            <div class="NavBrand">
                <span class="material-symbols-rounded BrandIcon">school</span>
                <span class="BrandText">SmartClearance</span>
            </div>
            <div class="NavActions">
                <button class="BtnText">Help</button>
                <button class="BtnPrimary" id="BtnLogin">Sign In</button>
            </div>
        </nav>

        <section class="HeroSection">
            <div class="HeroText">
                <div class="Badge">
                    <span class="material-symbols-rounded">auto_awesome</span>
                    Isabela State University
                </div>
                <h1 class="HeroTitle">Clearance,<br>Reimagined.</h1>
                <p class="HeroSubtitle">Experience the ultra-smooth, intelligent, and secure way to process your university clearance using advanced data mining and facial recognition.</p>
                <div class="HeroButtons">
                    <button class="BtnPrimary Large">Get Started</button>
                    <button class="BtnSecondary Large">
                        <span class="material-symbols-rounded">play_circle</span>
                        Watch Demo
                    </button>
                </div>
            </div>
            <div class="HeroVisual">
                <div class="GlassCard AbstractShape1"></div>
                <div class="GlassCard AbstractShape2">
                    <span class="material-symbols-rounded CardIcon">verified_user</span>
                    <div class="CardLines">
                        <div class="Line"></div>
                        <div class="Line Short"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./Scripts/SupabaseClient.js"></script>
    <script src="./Scripts/App.js"></script>
</body>
</html>
